<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Full Screen Scanner</title>
        <script src="https://unpkg.com/html5-qrcode"></script>
        <style>
            body,
            html {
                margin: 0;
                padding: 0;
                width: 100%;
                height: 100%;
                background-color: #000;
                overflow: hidden;
            }
            /* Kontainer scanner memenuhi layar */
            #reader {
                width: 100vw;
                height: 100vh;
            }
            /* Menghilangkan border default library agar lebih clean */
            #reader__dashboard {
                display: none !important;
            }
            #reader video {
                object-fit: cover; /* Penting: Agar video memenuhi layar */
            }
        </style>
    </head>
    <body>
        <div id="reader"></div>

        <script>
            function onScanSuccess(decodedText, decodedResult) {
                // Aksi setelah berhasil scan
                alert("Hasil Scan: " + decodedText);

                // Jika ingin pindah halaman otomatis:
                // window.location.href = "/transaksi_detail/" + decodedText;
            }

            const html5QrCode = new Html5Qrcode("reader");
            const config = {
                fps: 15,
                qrbox: { width: 250, height: 250 }, // Kotak target di tengah
                aspectRatio: window.innerWidth / window.innerHeight, // Rasio layar HP
            };

            // Mulai kamera belakang otomatis
            Html5Qrcode.getCameras()
                .then((devices) => {
                    if (devices && devices.length) {
                        let cameraId = devices[devices.length - 1].id; // Biasanya kamera belakang
                        html5QrCode.start(
                            { facingMode: "environment" }, // Paksa kamera belakang
                            config,
                            onScanSuccess,
                        );
                    }
                })
                .catch((err) => {
                    console.error("Gagal akses kamera: ", err);
                });
        </script>
    </body>
</html>

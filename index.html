
<style>
    /* 1. Base Camera Setup */
    #reader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background: #000;
        z-index: 1000;
    }

    #reader video {
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
    }

    /* 2. Layer Overlay */
    .scanner-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1001;
        pointer-events: none;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
    }

    /* 3. Kotak Pembidik Diperbesar (320px - 350px biasanya ideal untuk HP) */
    .scanner-frame {
        width: 350px; /* Ukuran diperbesar */
        height: 350px; /* Ukuran diperbesar */
        border: 5px solid #28a745; /* Garis lebih tebal */
        border-radius: 25px;
        box-shadow: 0 0 0 1000px rgba(0, 0, 0, 0.6); /* Area luar lebih gelap agar fokus */
        position: relative;
    }

    /* Efek Sudut (Corner Brackets) agar lebih keren */
    .scanner-frame::before, .scanner-frame::after {
        content: "";
        position: absolute;
        width: 40px;
        height: 40px;
        border: 6px solid #28a745;
    }

    /* Samping kiri atas */
    .scanner-frame::before { top: -5px; left: -5px; border-right: 0; border-bottom: 0; border-radius: 20px 0 0 0; }
    /* Samping kanan bawah */
    .scanner-frame::after { bottom: -5px; right: -5px; border-left: 0; border-top: 0; border-radius: 0 0 20px 0; }

    /* Laser Line */
    .laser {
        position: absolute;
        width: 90%;
        left: 5%;
        height: 3px;
        background-color: #28a745;
        box-shadow: 0 0 15px #28a745;
        top: 0;
        animation: scanAnim 2.5s infinite ease-in-out;
    }

    @keyframes scanAnim {
        0% { top: 5%; opacity: 0.2; }
        50% { top: 90%; opacity: 1; }
        100% { top: 5%; opacity: 0.2; }
    }

    .label-text {
        color: white;
        margin-top: 30px;
        font-size: 18px;
        font-weight: 600;
        text-shadow: 2px 2px 10px rgba(0,0,0,1);
    }
</style>

<div id="reader"></div>

<div class="scanner-overlay">
    <div class="scanner-frame">
        <div class="laser"></div>
    </div>
    <div class="label-text">Pusatkan QR Code di dalam kotak</div>
</div>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    const html5QrCode = new Html5Qrcode("reader");
    
    const qrCodeSuccessCallback = (decodedText) => {
        // Langsung redirect jika berhasil
        window.location.href = decodedText;
    };

    const config = { 
        fps: 20, 
        // qrbox disesuaikan dengan ukuran CSS agar area sensor pas di kotak hijau
        qrbox: { width: 350, height: 350 } 
    };

    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        qrCodeSuccessCallback
    ).catch((err) => {
        alert("Kamera tidak dapat diakses. Pastikan izin kamera diberikan.");
    });
</script>

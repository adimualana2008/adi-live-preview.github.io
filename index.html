
<style>
    /* Membuat area kamera memenuhi layar */
    #reader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 10;
        background-color: black;
    }

    /* Menghilangkan tombol-tombol bawaan library yang mengganggu */
    #reader button {
        padding: 10px 20px;
        border-radius: 5px;
        border: none;
        background: #28a745;
        color: white;
        font-weight: bold;
        margin-top: 10px;
    }

    /* Overlay untuk membuat efek kotak di tengah */
    .scanner-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 11;
        pointer-events: none; /* Agar tidak menghalangi klik */
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .scanner-frame {
        width: 250px;
        height: 250px;
        border: 4px solid #28a745;
        border-radius: 20px;
        box-shadow: 0 0 0 5000px rgba(0, 0, 0, 0.5); /* Membuat area luar kotak jadi gelap */
        position: relative;
    }

    /* Animasi garis scan */
    .scanner-line {
        position: absolute;
        width: 100%;
        height: 2px;
        background-color: #28a745;
        top: 0;
        animation: scanMove 2s infinite linear;
    }

    @keyframes scanMove {
        0% { top: 0; }
        100% { top: 100%; }
    }

    .back-btn {
        position: fixed;
        bottom: 30px;
        z-index: 12;
        background: white;
        padding: 10px 20px;
        border-radius: 30px;
        text-decoration: none;
        color: #333;
        font-weight: bold;
    }
</style>

<div id="reader"></div>

<div class="scanner-overlay">
    <div class="scanner-frame">
        <div class="scanner-line"></div>
    </div>
</div>

<a href="{{ url()->previous() }}" class="back-btn">Kembali</a>

<script src="https://unpkg.com/html5-qrcode"></script>
<script>
    function onScanSuccess(decodedText) {
        // Langsung redirect ke URL hasil scan
        window.location.href = decodedText;
    }

    let html5QrCode = new Html5Qrcode("reader");
    
    const config = { 
        fps: 15, 
        qrbox: { width: 250, height: 250 },
        aspectRatio: 1.0 // Membuat area scan kotak sempurna
    };

    // Menjalankan kamera belakang secara otomatis
    html5QrCode.start(
        { facingMode: "environment" }, 
        config, 
        onScanSuccess
    );
</script>

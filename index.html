<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>Full Screen Barcode Scanner</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body,
            html {
                height: 100%;
                overflow: hidden;
                background-color: #000;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
            }

            /* Container Kamera Full Screen */
            #reader {
                width: 100vw;
                height: 100vh;
            }

            /* Menghilangkan border default library */
            #reader img {
                display: none;
            }
            #reader video {
                object-fit: cover !important;
                width: 100vw !important;
                height: 100vh !important;
            }

            /* Overlay UI */
            .scan-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                align-items: center;
                pointer-events: none; /* Agar klik tetap tembus ke tombol start/stop */
                z-index: 10;
            }

            .header {
                background: rgba(0, 0, 0, 0.5);
                color: white;
                width: 100%;
                padding: 20px;
                text-align: center;
            }

            /* Garis Pemindai Animasi */
            .scan-line {
                width: 80%;
                height: 2px;
                position: absolute;
                top: 50%;
                animation: move-line 3s infinite linear;
            }

            @keyframes move-line {
                0% {
                    top: 30%;
                }
                50% {
                    top: 70%;
                }
                100% {
                    top: 30%;
                }
            }

            .result-box {
                background: white;
                padding: 15px;
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
                width: 100%;
                pointer-events: auto;
                text-align: center;
            }

            /* Tombol Start/Stop kustom (Opsional) */
            #reader__dashboard_section_csr button {
                background: #007bff;
                color: white;
                border: none;
                padding: 10px 20px;
                border-radius: 5px;
                margin: 10px;
            }
        </style>
    </head>
    <body>
        <div class="scan-overlay">
            <div class="header">Arahkan Kamera ke Barcode</div>
            <div class="scan-line"></div>
            <div class="result-box">
                <p id="scanned-result">Menunggu Scan...</p>
            </div>
        </div>

        <div id="reader"></div>

        <script src="https://unpkg.com/html5-qrcode"></script>
        <script src="">
                    function onScanSuccess(decodedText, decodedResult) {
                // Memberikan getaran pada ponsel (jika didukung)
                if (navigator.vibrate) navigator.vibrate(100);

                document.getElementById('scanned-result').innerHTML = `
                    <strong>Hasil:</strong> ${decodedText}
                `;

                console.log(`Code: ${decodedText}`);
            }

            // Inisialisasi scanner
            const html5QrCode = new Html5Qrcode("reader");

            const config = {
                fps: 20,
                // QR Box mengambil 70% dari lebar layar
                qrbox: (viewfinderWidth, viewfinderHeight) => {
                    let minEdgeSize = Math.min(viewfinderWidth, viewfinderHeight);
                    let qrboxSize = Math.floor(minEdgeSize * 0.7);
                    return {
                        width: qrboxSize,
                        height: qrboxSize / 1.5 // Bentuk persegi panjang untuk barcode
                    };
                },
                aspectRatio: 1.0 // Memaksa rasio agar penuh
            };

            // Memulai kamera belakang secara otomatis
            html5QrCode.start(
                { facingMode: "environment" },
                config,
                onScanSuccess
            ).catch(err => {
                console.error("Gagal memulai kamera: ", err);
            });
        </script>
    </body>
</html>
